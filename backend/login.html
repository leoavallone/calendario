<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Login - OneFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --secondary: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }
        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .login-card h2 {
            color: var(--primary);
            margin-bottom: 5px;
        }
        .login-card p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
        .footer-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">📅</div>
        <h2 style="font-weight: 600; font-size: 1.8rem; margin-bottom: 2px;">OneFlow <span style="display: block; font-size: 0.7rem; opacity: 0.7; font-weight: normal;">BY RoqIA</span></h2>
        <p>Acesse sua conta para continuar</p>

        <div id="errorBox" class="error-msg"></div>

        <form id="loginForm">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Entrar</button>
        </form>

        <div class="footer-link">
            Não possui conta? <a href="/cadastro">Cadastre-se</a>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');

            try {
                const res = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();
                
                if (!res.ok) {
                    errorBox.textContent = data.error || 'Erro ao conectar';
                    errorBox.style.display = 'block';
                    return;
                }

                // Save auth context
                localStorage.setItem('roqia_token', data.token);
                localStorage.setItem('roqia_user', JSON.stringify(data.user));
                
                // Redirect to calendar
                window.location.href = '/';
            } catch (err) {
                errorBox.textContent = 'Falha crítica no sistema.';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
