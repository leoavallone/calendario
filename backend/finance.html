<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Painel Financeiro - OneFlow</title>
    <script>
        const tCheck = localStorage.getItem('roqia_token');
        const uCheckJSON = localStorage.getItem('roqia_user');
        if (!tCheck || !uCheckJSON) { window.location.href = '/login'; }
        else {
            const tempU = JSON.parse(uCheckJSON);
            if (tempU.role !== 'owner') window.location.href = '/';
        }
    </script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --secondary: #f8fafc;
            --accent: #8b5cf6;
            --text: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text);
            min-height: 100vh;
        }
        .container { max-width: 1400px; margin: 0 auto; padding: 20px; }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: var(--white);
            padding: 25px;
            border-radius: 16px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.2);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 130px;
        }
        .logo { display: flex; align-items: center; gap: 15px; }
        .logo-icon { width: 50px; height: 50px; background: var(--white); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        
        .navbar {
            display: flex;
            gap: 15px;
            background: rgba(255,255,255,0.15);
            padding: 6px 12px;
            border-radius: 12px;
            backdrop-filter: blur(10px);
        }
        .nav-link {
            color: var(--white);
            text-decoration: none;
            font-weight: 600;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .nav-link:hover, .nav-link.active {
            background: rgba(255,255,255,0.25);
            transform: scale(1.05);
        }
        
        .header-right {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .user-selector {
            display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.15);
            padding: 10px 20px; border-radius: 10px; backdrop-filter: blur(10px);
        }
        .user-selector select { background: var(--white); border: none; padding: 8px 15px; border-radius: 8px; font-size: 14px; cursor: pointer; color: var(--text); }
        
        .dashboard-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 20px;
            margin-bottom: 30px;
        }
        .dash-card {
            background: var(--white);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 20px;
            transition: transform 0.3s;
        }
        .dash-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
        }
        .dash-icon {
            width: 60px; height: 60px; border-radius: 15px;
            display: flex; align-items: center; justify-content: center; font-size: 28px;
        }
        .dash-icon.income { background: rgba(16, 185, 129, 0.1); color: var(--success); }
        .dash-icon.expense { background: rgba(239, 68, 68, 0.1); color: var(--danger); }
        .dash-icon.balance { background: rgba(37, 99, 235, 0.1); color: var(--primary); }
        .dash-info h3 { font-size: 0.9rem; color: var(--text-light); margin-bottom: 5px; }
        .dash-info p { font-size: 1.8rem; font-weight: 700; color: var(--text); }
        
        .card { background: var(--white); border-radius: 16px; padding: 25px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid var(--border); margin-bottom: 30px; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border); }
        .card-title { font-size: 1.25rem; font-weight: 700; color: var(--primary); display: flex; align-items: center; gap: 10px; }
        
        .btn { padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-weight: 600; transition: all 0.3s; display: inline-flex; align-items: center; gap: 8px; font-size: 14px; }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); box-shadow: 0 4px 12px rgba(37, 99, 235, 0.3); }
        .btn-secondary { background: var(--secondary); color: var(--text); border: 1px solid var(--border); }
        .btn-secondary:hover { background: var(--border); }
        .btn-success { background: var(--success); color: white; }
        .btn-success:hover { background: #059669; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(16,185,129,0.3); }
        .btn-danger-outline { background: transparent; color: var(--danger); border: 1px solid var(--border); transition: 0.2s;}
        .btn-danger-outline:hover { background: var(--danger); color: white; border-color: var(--danger);}

        .month-navigation { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .nav-btn { background: var(--white); border: 2px solid var(--border); width: 40px; height: 40px; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 18px; transition: all 0.3s; color: var(--primary); }
        .nav-btn:hover { border-color: var(--primary); background: var(--primary); color: var(--white); }
        .current-month { font-size: 1.25rem; font-weight: 700; color: var(--text); text-transform: capitalize; }

        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid var(--border); }
        th { color: var(--text-light); font-weight: 600; font-size: 0.85rem; text-transform: uppercase; }
        tr:hover { background: var(--secondary); }
        
        .badge { padding: 4px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 600; }
        .badge-income { background: rgba(16,185,129,0.1); color: var(--success); }
        .badge-expense { background: rgba(239,68,68,0.1); color: var(--danger); }

        .api-docs { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); color: var(--white); border-radius: 16px; padding: 25px; }
        .api-docs h2 { color: var(--accent); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .endpoint { background: rgba(255,255,255,0.05); border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--success); }
        .endpoint-header { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; font-family: 'Courier New', monospace; }
        .method.post { background: var(--success); padding: 4px 10px; border-radius: 6px; font-weight: 700; font-size: 0.75rem; color: white;}
        .path { color: var(--accent); font-weight: 600; }
        .endpoint-description { color: #94a3b8; font-size: 0.875rem; margin-bottom: 10px;}
        .code-block { background: #000; padding: 15px; border-radius: 8px; font-family: 'Courier New', monospace; font-size: 0.85rem; color: #a5b4fc; overflow-x: auto; white-space: pre-wrap; }

        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal.active { display: flex; }
        .modal-content { background: var(--white); border-radius: 20px; padding: 30px; width: 90%; max-width: 500px; animation: slideUp 0.3s ease; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.25); }
        @keyframes slideUp { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: translateY(0); } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; }
        .modal-title { font-size: 1.5rem; color: var(--primary); font-weight: 700; }
        .close-btn { background: none; border: none; font-size: 28px; cursor: pointer; color: var(--text-light); border-radius: 10px; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .close-btn:hover { background: var(--secondary); color: var(--text); }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text); font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px 15px; border: 2px solid var(--border); border-radius: 10px; font-size: 14px; transition: 0.3s; font-family: inherit; }
        .form-group input:focus, .form-group select:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37,99,235,0.1); }
        
        .notification { position: fixed; top: 20px; right: 20px; padding: 15px 25px; border-radius: 12px; color: white; font-weight: 600; z-index: 2000; transform: translateX(400px); transition: transform 0.3s ease; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .notification.show { transform: translateX(0); }
        .notification.success { background: var(--success); }
        .notification.error { background: var(--danger); }

        @media (max-width: 768px) {
            .container { padding: 10px; }
            .dashboard-cards { grid-template-columns: 1fr; }
            header { flex-direction: column; text-align: center; gap: 15px; height: auto; padding: 20px 15px; }
            .navbar { width: 100%; justify-content: center; }
            .user-selector { width: 100%; justify-content: center; }
            .header-right { width: 100%; align-items: center; }
            .card-header { flex-wrap: wrap; gap: 10px; }
            table, thead, tbody, th, td, tr { display: block; }
            thead tr { position: absolute; top: -9999px; left: -9999px; }
            tr { border: 1px solid var(--border); margin-bottom: 10px; border-radius: 10px; padding: 10px; }
            td { border: none; position: relative; padding-left: 50%; text-align: right; }
            td:before { position: absolute; top: 15px; left: 15px; width: 45%; padding-right: 10px; white-space: nowrap; font-weight: 600; text-align: left; }
            td:nth-of-type(1):before { content: "Data"; }
            td:nth-of-type(2):before { content: "Descrição"; }
            td:nth-of-type(3):before { content: "Tipo"; }
            td:nth-of-type(4):before { content: "Valor"; }
            td:nth-of-type(5):before { content: ""; }
        }
    </style>
</head>
<body>
    <div id="notification" class="notification"></div>
    <div class="container">
        <header>
            <div class="logo">
                <div class="logo-icon">💰</div>
                <div>
                    <h1 style="font-weight: 600; font-size: 1.8rem; margin-bottom: 2px;">OneFlow <span style="display: block; font-size: 0.7rem; opacity: 0.7; font-weight: normal;">BY RoqIA</span></h1>
                    <p style="opacity: 0.9; font-size: 0.875rem;">Painel Financeiro</p>
                </div>
            </div>
            
            <nav class="navbar">
                <a href="index.html" class="nav-link">📅 Agenda</a>
                <a href="finance.html" class="nav-link active">💰 Financeiro</a>
            </nav>

            <div class="header-right">
                <div class="user-selector">
                    <span>👤</span>
                    <select id="userSelect" onchange="changeUser()">
                        <option value="">Carregando...</option>
                    </select>
                    <button class="btn-icon" style="background:var(--white); color:var(--text); border:1px solid var(--border); border-radius:8px; width:36px; height:36px; margin-left:10px; cursor:pointer;" onclick="logout()" title="Sair do Sistema">🚪</button>
                </div>
            </div>
        </header>

        <div class="month-navigation">
            <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
            <div class="current-month" id="currentMonthLabel"></div>
            <button class="nav-btn" onclick="changeMonth(1)">›</button>
        </div>

        <div class="dashboard-cards">
            <div class="dash-card">
                <div class="dash-icon income">📈</div>
                <div class="dash-info">
                    <h3>Total Receitas</h3>
                    <p id="totalIncome">R$ 0,00</p>
                </div>
            </div>
            <div class="dash-card">
                <div class="dash-icon expense">📉</div>
                <div class="dash-info">
                    <h3>Total Despesas</h3>
                    <p id="totalExpense">R$ 0,00</p>
                </div>
            </div>
            <div class="dash-card">
                <div class="dash-icon balance">💰</div>
                <div class="dash-info">
                    <h3>Saldo Atual</h3>
                    <p id="totalBalance">R$ 0,00</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">
                <div class="card-title">
                    <span>📋</span> Histórico de Transações
                </div>
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-secondary" onclick="openFixedCostModal()">
                        <span>⚙️</span> Custos Fixos
                    </button>
                    <button class="btn btn-success" onclick="openModal()">
                        <span>+</span> Nova Transação
                    </button>
                </div>
            </div>
            
            <table>
                <thead>
                    <tr>
                        <th>Data</th>
                        <th>Descrição</th>
                        <th>Tipo</th>
                        <th>Valor</th>
                        <th style="width: 50px;">Ações</th>
                    </tr>
                </thead>
                <tbody id="transactionsTableBody">
                    <tr><td colspan="5" style="text-align: center; color: var(--text-light);">Carregando integrações...</td></tr>
                </tbody>
            </table>
        </div>


    </div>

    <!-- Modal Nova Transação -->
    <div class="modal" id="transactionModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Nova Transação</h3>
                <button class="close-btn" onclick="closeModal()">×</button>
            </div>
            <form id="transactionForm" onsubmit="saveTransaction(event)">
                <input type="hidden" id="tId">
                <div class="form-group">
                    <label>Tipo</label>
                    <select id="tType" required>
                        <option value="income">Receita (Ganho)</option>
                        <option value="expense">Despesa (Custo)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Descrição / Nome do Cliente</label>
                    <input type="text" id="tDesc" placeholder="Ex: Corte de Cabelo" required>
                </div>
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="tAmount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="tDate" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
                    Salvar Lançamento
                </button>
            </form>
        </div>
    </div>

    <!-- Modal Custos Fixos -->
    <div class="modal" id="fixedCostModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3 class="modal-title">Custos Fixos do Mês</h3>
                <button class="close-btn" onclick="closeFixedCostModal()">×</button>
            </div>
            <form id="fixedCostForm" onsubmit="saveFixedCost(event)">
                <div class="form-group">
                    <label>Descrição</label>
                    <input type="text" id="fcDesc" placeholder="Ex: Aluguel, Sistema, Empréstimo" required>
                </div>
                <div class="form-group">
                    <label>Valor (R$)</label>
                    <input type="number" id="fcAmount" step="0.01" min="0.01" placeholder="0.00" required>
                </div>
                <div class="form-group">
                    <label>Dia do Vencimento (1 a 31)</label>
                    <input type="number" id="fcDay" min="1" max="31" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; margin-top: 10px;">
                    Adicionar Custo Fixo
                </button>
            </form>
            <div style="margin-top: 20px;">
                <h4 style="margin-bottom: 10px; color: var(--text-light); border-bottom: 2px solid var(--border); padding-bottom: 5px;">Meus Custos Recorrentes</h4>
                <div id="fixedCostList" style="max-height: 200px; overflow-y: auto;">
                    <!-- Preenchido via JS -->
                </div>
            </div>
        </div>
    </div>

    <script>
        let usersData = [];
        let currentUser = null;
        let currentFinanceDate = new Date();

        const token = localStorage.getItem('roqia_token');
        const localUserJSON = localStorage.getItem('roqia_user');
        const localUser = JSON.parse(localUserJSON || '{}');

        const authHeaders = { 'Authorization': `Bearer ${token}` };
        const jsonHeaders = { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` };

        function logout() {
            localStorage.removeItem('roqia_token');
            localStorage.removeItem('roqia_user');
            window.location.href = '/login';
        }

        document.addEventListener('DOMContentLoaded', async () => {
            const today = new Date();
            document.getElementById('tDate').value = today.toISOString().split('T')[0];
            updateMonthLabel();
            await loadUsers();
        });

        async function loadUsers() {
            try {
                const res = await fetch('/api/users', { headers: authHeaders });
                if (!res.ok) throw new Error('Falha ao buscar usuários');
                usersData = await res.json();

                const select = document.getElementById('userSelect');
                select.innerHTML = '';
                usersData.forEach((user, idx) => {
                    const opt = document.createElement('option');
                    opt.value = user._id;
                    opt.textContent = user.name;
                    select.appendChild(opt);
                    if (idx === 0) currentUser = user;
                });

                const realLocalUser = usersData.find(u => u._id === localUser._id);
                if (realLocalUser) {
                    localStorage.setItem('roqia_user', JSON.stringify(realLocalUser));
                    if (realLocalUser.role !== 'owner') {
                        window.location.href = '/';
                        return;
                    }
                }

                if (currentUser) {
                    await loadTransactions();
                }
            } catch (err) {
                console.error(err);
                showNotification('Erro API de Usuários', 'error');
            }
        }

        function changeUser() {
            const id = document.getElementById('userSelect').value;
            currentUser = usersData.find(u => u._id === id);
            if(currentUser) {
                loadTransactions();
            }
        }

        function changeMonth(delta) {
            currentFinanceDate.setMonth(currentFinanceDate.getMonth() + delta);
            updateMonthLabel();
            loadTransactions();
        }

        function updateMonthLabel() {
            const monthNames = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho',
                               'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            document.getElementById('currentMonthLabel').textContent = `${monthNames[currentFinanceDate.getMonth()]} ${currentFinanceDate.getFullYear()}`;
        }

        async function loadTransactions() {
            if (!currentUser) return;
            try {
                const month = currentFinanceDate.getMonth() + 1;
                const year = currentFinanceDate.getFullYear();
                const res = await fetch(`/api/transactions?userId=${currentUser._id}&month=${month}&year=${year}`, { headers: authHeaders });
                let data = await res.json();
                
                // Filter by month
                data = data.filter(t => {
                   const datePart = t.date.split('-');
                   return parseInt(datePart[0]) === year && parseInt(datePart[1]) === month;
                });
                
                renderTransactions(data);
            } catch (err) {
                showNotification('Erro buscar transações', 'error');
            }
        }

        function renderTransactions(transactions) {
            const tbody = document.getElementById('transactionsTableBody');
            let income = 0;
            let expense = 0;

            // Ordenar de forma explícita da mais atual para a mais antiga (Decrescente)
            transactions.sort((a, b) => {
                const dateA = new Date(a.date);
                const dateB = new Date(b.date);
                if (dateB.getTime() !== dateA.getTime()) {
                    return dateB.getTime() - dateA.getTime();
                }
                // Se as datas forem iguais, usar a ordem de criação
                return new Date(b.createdAt) - new Date(a.createdAt);
            });

            if (transactions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" style="text-align: center; color: var(--text-light);">Nenhuma transação encontrada.</td></tr>';
                document.getElementById('totalIncome').textContent = formatCurrency(0);
                document.getElementById('totalExpense').textContent = formatCurrency(0);
                document.getElementById('totalBalance').textContent = formatCurrency(0);
                return;
            }

            tbody.innerHTML = transactions.map(t => {
                if (t.type === 'income') income += t.amount;
                if (t.type === 'expense') expense += t.amount;

                const dateSplit = t.date.split('-');
                const formattedDate = dateSplit.length === 3 ? `${dateSplit[2]}/${dateSplit[1]}/${dateSplit[0]}` : t.date;
                const badge = t.type === 'income' 
                    ? '<span class="badge badge-income">Receita</span>' 
                    : '<span class="badge badge-expense">Despesa</span>';

                return `
                    <tr>
                        <td>${formattedDate}</td>
                        <td><strong>${t.description}</strong></td>
                        <td>${badge}</td>
                        <td style="font-weight: 500;">${formatCurrency(t.amount)}</td>
                        <td>
                            <div style="display: flex; gap: 5px; align-items: center;">
                                <button class="btn btn-secondary" style="padding: 5px 10px; color: var(--text);" onclick="editTransaction('${t._id}', '${t.type}', '${t.description.replace(/'/g, "\\'")}', ${t.amount}, '${t.date}')">✏️</button>
                                <button class="btn btn-danger-outline" style="padding: 5px 10px;" onclick="deleteTransaction('${t._id}')">X</button>
                            </div>
                        </td>
                    </tr>
                `;
            }).join('');

            document.getElementById('totalIncome').textContent = formatCurrency(income);
            document.getElementById('totalExpense').textContent = formatCurrency(expense);
            document.getElementById('totalBalance').textContent = formatCurrency(income - expense);
        }

        async function saveTransaction(e) {
            e.preventDefault();
            if(!currentUser) return showNotification('Nenhum usuário', 'error');

            const id = document.getElementById('tId').value;
            const payload = {
                userId: currentUser._id,
                type: document.getElementById('tType').value,
                description: document.getElementById('tDesc').value,
                amount: parseFloat(document.getElementById('tAmount').value),
                date: document.getElementById('tDate').value
            };

            try {
                let res;
                if (id) {
                    res = await fetch(`/api/transactions/${id}`, {
                        method: 'PUT',
                        headers: jsonHeaders,
                        body: JSON.stringify(payload)
                    });
                } else {
                    res = await fetch('/api/transactions', {
                        method: 'POST',
                        headers: jsonHeaders,
                        body: JSON.stringify(payload)
                    });
                }
                
                if(!res.ok) throw new Error('Erro ao salvar');
                
                showNotification(id ? 'Transação atualizada! ✅' : 'Transação adicionada! ✅');
                closeModal();
                loadTransactions();
            } catch (err) {
                showNotification('Erro ao salvar', 'error');
            }
        }

        function editTransaction(id, type, desc, amount, date) {
            document.getElementById('tId').value = id;
            document.getElementById('tType').value = type;
            document.getElementById('tDesc').value = desc;
            document.getElementById('tAmount').value = amount;
            document.getElementById('tDate').value = date;
            
            document.querySelector('#transactionModal .modal-title').textContent = 'Editar Transação';
            document.getElementById('transactionModal').classList.add('active');
        }

        async function deleteTransaction(id) {
            if(!confirm('Deseja realmente apagar esta transação?')) return;
            try {
                const res = await fetch(`/api/transactions/${id}`, { method: 'DELETE', headers: authHeaders });
                if(!res.ok) throw new Error('Falha ao remover');
                showNotification('Removido com sucesso!');
                loadTransactions();
            } catch (err) {
                showNotification('Erro ao deletar', 'error');
            }
        }

        function formatCurrency(val) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(val);
        }

        function openModal() { 
            document.getElementById('transactionForm').reset();
            document.getElementById('tId').value = '';
            document.querySelector('#transactionModal .modal-title').textContent = 'Nova Transação';
            const today = new Date();
            document.getElementById('tDate').value = today.toISOString().split('T')[0];
            document.getElementById('transactionModal').classList.add('active'); 
        }
        function closeModal() {
            document.getElementById('transactionModal').classList.remove('active');
            document.getElementById('transactionForm').reset();
            document.getElementById('tId').value = '';
        }

        function openFixedCostModal() {
            document.getElementById('fixedCostModal').classList.add('active');
            loadFixedCosts();
        }
        function closeFixedCostModal() {
            document.getElementById('fixedCostModal').classList.remove('active');
        }

        async function loadFixedCosts() {
            if (!currentUser) return;
            const res = await fetch(`/api/fixed-expenses?userId=${currentUser._id}`, { headers: authHeaders });
            const data = await res.json();
            const list = document.getElementById('fixedCostList');
            if(data.length === 0) {
                 list.innerHTML = '<p style="font-size: 0.85rem; color: var(--text-light);">Nenhum custo fixo registrado.</p>';
                 return;
            }
            list.innerHTML = data.map(fc => `
                <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px;">
                    <div><strong>${fc.description}</strong> - ${formatCurrency(fc.amount)}<br><small>Todo dia ${fc.dayOfMonth}</small></div>
                    <button class="btn btn-danger-outline" style="padding: 5px;" onclick="deleteFixedCost('${fc._id}')">X</button>
                </div>
            `).join('');
        }

        async function saveFixedCost(e) {
            e.preventDefault();
            if(!currentUser) return;
            const payload = {
                userId: currentUser._id,
                description: document.getElementById('fcDesc').value,
                amount: parseFloat(document.getElementById('fcAmount').value),
                dayOfMonth: parseInt(document.getElementById('fcDay').value, 10)
            };
            try {
                const res = await fetch('/api/fixed-expenses', {
                    method: 'POST',
                    headers: jsonHeaders,
                    body: JSON.stringify(payload)
                });
                if(!res.ok) throw new Error('Erro');
                showNotification('Custo fixo adicionado!');
                document.getElementById('fixedCostForm').reset();
                loadFixedCosts();
                loadTransactions(); 
            } catch (err) {
                showNotification('Erro ao salvar', 'error');
            }
        }

        async function deleteFixedCost(id) {
            if(!confirm('Deseja deletar este custo fixo?')) return;
            try {
                await fetch(`/api/fixed-expenses/${id}`, { method: 'DELETE', headers: authHeaders });
                showNotification('Removido!');
                loadFixedCosts();
            } catch (err) {
                showNotification('Erro', 'error');
            }
        }

        function showNotification(msg, type='success') {
            const el = document.getElementById('notification');
            el.textContent = msg;
            el.className = `notification ${type} show`;
            setTimeout(() => el.classList.remove('show'), 3000);
        }
    </script>
</body>
</html>

<script src="/socket.io/socket.io.js"></script>
<script>
    const socket = io();
    socket.on('refreshData', async () => {
        if (currentUser) {
            await loadTransactions();
            showNotification('Atualizado automaticamente pelo sistema ✨', 'success');
        }
    });
</script>
