<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - RoqIA</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --secondary: #f8fafc;
            --text: #1e293b;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
        }
        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
        }
        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .login-card h2 {
            color: var(--primary);
            margin-bottom: 5px;
        }
        .login-card p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 0.9rem;
        }
        .form-group {
            text-align: left;
            margin-bottom: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus, .form-group select:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .error-msg {
            color: var(--danger);
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
        .success-msg {
            color: #10b981;
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
        }
        .footer-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">✂️</div>
        <h2>Criar Conta</h2>
        <p>Junte-se ao sistema de gestão</p>

        <div id="errorBox" class="error-msg"></div>
        <div id="successBox" class="success-msg">Conta criada com sucesso! Redirecionando...</div>

        <form id="registerForm">
            <div class="form-group">
                <label>Nome Completo</label>
                <input type="text" id="name" required placeholder="Ex: Jefferson Silva">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <div class="form-group">
                <label>Senha</label>
                <input type="password" id="password" required placeholder="••••••••" minlength="4">
            </div>
            <div class="form-group">
                <label>Perfil (Cargo)</label>
                <select id="role" required>
                    <option value="barber">Barbeiro / Colaborador</option>
                    <option value="owner">Dono / Gerente (Acesso Financeiro)</option>
                </select>
            </div>
            <button type="submit" class="btn">Cadastrar</button>
        </form>

        <div class="footer-link">
            Já possui conta? <a href="/login">Faça login</a>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const role = document.getElementById('role').value;
            
            const errorBox = document.getElementById('errorBox');
            const successBox = document.getElementById('successBox');
            errorBox.style.display = 'none';

            try {
                // Initialize clean schedule payload
                const payload = {
                    name, 
                    email, 
                    password, 
                    role,
                    workDays: {
                        monday: false, tuesday: true, wednesday: true, 
                        thursday: true, friday: true, saturday: true, sunday: false
                    },
                    workSchedule: { start: "09:00", end: "18:00" },
                    interval: 30
                };

                const res = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await res.json();
                
                if (!res.ok) {
                    errorBox.textContent = data.error || data.message || 'Erro ao conectar';
                    errorBox.style.display = 'block';
                    return;
                }

                // Login automatically after register
                const loginRes = await fetch('/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();

                if (loginRes.ok) {
                    localStorage.setItem('roqia_token', loginData.token);
                    localStorage.setItem('roqia_user', JSON.stringify(loginData.user));
                    successBox.style.display = 'block';
                    setTimeout(() => window.location.href = '/', 1500);
                } else {
                    window.location.href = '/login';
                }

            } catch (err) {
                errorBox.textContent = 'Falha crítica no sistema.';
                errorBox.style.display = 'block';
            }
        });
    </script>
</body>
</html>
