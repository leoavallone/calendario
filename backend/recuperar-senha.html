<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="manifest" href="/site.webmanifest">
    <meta name="apple-mobile-web-app-title" content="One Flow">
    <meta name="application-name" content="One Flow">
    <meta name="theme-color" content="#4f46e5">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Recuperar Senha - OneFlow</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #4f46e5;
            --primary-dark: #3730a3;
            --secondary: #f8fafc;
            --text: #0f172a;
            --text-light: #64748b;
            --white: #ffffff;
            --border: #e2e8f0;
            --danger: #ef4444;
            --success: #10b981;
        }
        body {
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #f0f9ff 0%, #e0f2fe 100%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: var(--white);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(37, 99, 235, 0.1);
            width: 100%;
            max-width: 430px;
            text-align: center;
        }
        .logo-icon {
            font-size: 40px;
            margin-bottom: 10px;
        }
        .login-card h2 {
            color: var(--primary);
            margin-bottom: 5px;
        }
        .login-card p {
            color: var(--text-light);
            margin-bottom: 30px;
            font-size: 0.9rem;
            line-height: 1.5;
        }
        .form-group {
            text-align: left;
            margin-bottom: 18px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--text);
            font-size: 14px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid var(--border);
            border-radius: 10px;
            font-size: 14px;
            transition: 0.3s;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
        }
        .btn {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
        }
        .message {
            font-size: 0.85rem;
            margin-bottom: 15px;
            display: none;
            line-height: 1.4;
        }
        .message.error { color: var(--danger); }
        .message.success { color: var(--success); }
        .footer-link {
            margin-top: 20px;
            font-size: 0.9rem;
            color: var(--text-light);
        }
        .footer-link a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <div class="logo-icon">🔐</div>
        <h2 id="pageTitle" style="font-weight: 600; font-size: 1.8rem; margin-bottom: 2px;">Recuperar senha</h2>
        <p id="pageDescription">Informe o e-mail da conta para receber o link de redefinição.</p>

        <div id="messageBox" class="message"></div>

        <form id="requestForm">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" required placeholder="seu@email.com">
            </div>
            <button type="submit" class="btn">Enviar link</button>
        </form>

        <form id="resetForm" style="display:none">
            <div class="form-group">
                <label for="password">Nova senha</label>
                <input type="password" id="password" required minlength="4" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label for="confirmPassword">Confirmar nova senha</label>
                <input type="password" id="confirmPassword" required minlength="4" placeholder="••••••••">
            </div>
            <button type="submit" class="btn">Redefinir senha</button>
        </form>

        <div class="footer-link">
            Lembrou a senha? <a href="/login">Voltar para o login</a>
        </div>
    </div>

    <script>
        const API_BASE_URL = window.API_BASE_URL || (
            window.location.protocol === 'file:'
                ? 'https://oneflow.roqia.com.br/'
                : window.location.origin
        );

        function apiFetch(endpoint, options) {
            return fetch(new URL(endpoint, API_BASE_URL), options);
        }

        function showMessage(text, type) {
            const messageBox = document.getElementById('messageBox');
            messageBox.textContent = text;
            messageBox.className = `message ${type}`;
            messageBox.style.display = 'block';
        }

        const resetToken = new URLSearchParams(window.location.search).get('token');
        const requestForm = document.getElementById('requestForm');
        const resetForm = document.getElementById('resetForm');

        if (resetToken) {
            document.getElementById('pageTitle').textContent = 'Criar nova senha';
            document.getElementById('pageDescription').textContent = 'Digite e confirme sua nova senha para concluir a recuperação.';
            requestForm.style.display = 'none';
            resetForm.style.display = 'block';
        }

        requestForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('email').value.trim();

            try {
                const res = await apiFetch('/api/auth/forgot-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok) {
                    showMessage(data.error || 'Não foi possível enviar o link.', 'error');
                    return;
                }

                showMessage(data.message || 'Se esse email existir, enviaremos instruções.', 'success');
            } catch (err) {
                showMessage('Falha crítica no sistema.', 'error');
            }
        });

        resetForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showMessage('As senhas não conferem.', 'error');
                return;
            }

            try {
                const res = await apiFetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token: resetToken, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showMessage(data.error || 'Não foi possível redefinir a senha.', 'error');
                    return;
                }

                showMessage('Senha redefinida com sucesso. Redirecionando para o login...', 'success');
                setTimeout(() => window.location.href = '/login', 1400);
            } catch (err) {
                showMessage('Falha crítica no sistema.', 'error');
            }
        });
    </script>
</body>
</html>
